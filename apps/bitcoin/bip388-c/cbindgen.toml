language = "C"
pragma_once = true
cpp_compat = true
tab_width = 4
documentation = true
documentation_style = "c99"

header = """
/*
 * C bindings for the bip388 cleartext API. Generated by cbindgen — do not edit.
 *
 * Memory model: the caller provides ALL memory. `arena` is scratch the Rust
 * internals bump-allocate from for the duration of one call and is detached
 * before returning; `out` holds the rendered line bytes; `lines` receives
 * (ptr,len) slices into `out`. Nothing Rust-owned escapes, so there is nothing
 * to free. The binding is single-threaded. A `Bip388Line` is UTF-8 and is NOT
 * NUL-terminated; it stays valid until `out` is reused.
 *
 * Size `arena` per BIP388_RECOMMENDED_ARENA_SIZE; a genuine arena overflow
 * aborts cleanly (a trap) rather than returning a partial result.
 */
"""

[export]
prefix = ""
item_types = ["enums", "structs", "constants", "functions"]

[enum]
rename_variants = "QualifiedScreamingSnakeCase"

[fn]
sort_by = "None"

[const]
allow_static_const = true
