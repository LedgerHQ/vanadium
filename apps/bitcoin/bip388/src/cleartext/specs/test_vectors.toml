# =============================================================================
# Key derivation orderings: same key appears multiple times with canonical
# derivations (0;1), (2;3), (4;5), ... in some order. The confusion score
# picks up an extra factor of k! per key (where k is its multiplicity).
# =============================================================================

# @1 appears twice (<0;1>, <2;3>) -> factor 2! = 2
[[vector]]
template = "tr(@0/<0;1>/*,{and_v(v:pk(@1/<0;1>/*),older(4383)),and_v(v:pk(@2/<0;1>/*),pk(@1/<2;3>/*))})"
cleartext = [
    "Primary path: @0",
    "Both @2 and @1 must sign",
    "Single-signature (@1) after 4383 blocks",
]
has_cleartext = true

# Leaves are unambiguous but @1 and @2 each appear twice -> 2! * 2! = 4
[[vector]]
template = "tr(@0/<0;1>/*,{and_v(v:multi_a(2,@1/<0;1>/*,@2/<0;1>/*,@3/<0;1>/*),older(144)),and_v(v:pk(@1/<2;3>/*),pk(@2/<2;3>/*))})"
confusion_score = 4
cleartext = [
    "Primary path: @0",
    "Both @1 and @2 must sign",
    "2 of @1, @2 and @3 after 144 blocks",
]
has_cleartext = true

# @0 appears twice (key path + leaf) -> 2! = 2
[[vector]]
template = "tr(@0/<0;1>/*,pk(@0/<2;3>/*))"
cleartext = ["Primary path: @0", "Single-signature (@0)"]
has_cleartext = true

# @0 appears three times -> 3! = 6
[[vector]]
template = "tr(@0/<0;1>/*,{pk(@0/<2;3>/*),pk(@0/<4;5>/*)})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@0)",
    "Single-signature (@0)",
]
has_cleartext = true

# @1 appears twice in two leaves -> 2! = 2
[[vector]]
template = "tr(@0/**,{pk(@1/<0;1>/*),pk(@1/<2;3>/*)})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@1)",
    "Single-signature (@1)",
]
has_cleartext = true

# @1 appears twice across distinct leaf shapes -> 2! = 2
[[vector]]
template = "tr(@0/**,{and_v(v:pk(@1/<0;1>/*),older(4383)),pk(@1/<2;3>/*)})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@1)",
    "Single-signature (@1) after 4383 blocks",
]
has_cleartext = true

# @0 twice, @1 twice -> 2! * 2! = 4
[[vector]]
template = "tr(@0/<0;1>/*,{pk(@0/<2;3>/*),and_v(v:pk(@1/<0;1>/*),pk(@1/<2;3>/*))})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@0)",
    "Both @1 and @1 must sign",
]
has_cleartext = true

# =============================================================================
# Taproot AndV leaves: and_v(v:SUBPOLICY_1, SUBPOLICY_2)
# =============================================================================

# SingleSig AND SortedMultisig: score = 1 * 1 = 1
[[vector]]
template = "tr(@0/**,and_v(v:pk(@1/**),sortedmulti_a(2,@2/**,@3/**)))"
confusion_score = 1
cleartext = [
    "Primary path: @0",
    "Single-signature (@1) AND 2 of @2 and @3 (sorted)",
]
has_cleartext = true

# SingleSig AND Multisig (threshold == keys): score = 1 * 2 = 2
[[vector]]
template = "tr(@0/**,and_v(v:pk(@1/**),multi_a(2,@2/**,@3/**)))"
confusion_score = 2
cleartext = [
    "Primary path: @0",
    "Single-signature (@1) AND 2 of @2 and @3",
]
has_cleartext = true

# SortedMultisig AND Multisig (threshold == keys): score = 1 * 2 = 2
[[vector]]
template = "tr(@0/**,and_v(v:sortedmulti_a(2,@1/**,@2/**),multi_a(2,@3/**,@4/**)))"
confusion_score = 2
cleartext = [
    "Primary path: @0",
    "2 of @1 and @2 (sorted) AND 2 of @3 and @4",
]
has_cleartext = true

# Multisig AND Multisig (both threshold == keys): score = 2 * 2 = 4
[[vector]]
template = "tr(@0/**,and_v(v:multi_a(2,@1/**,@2/**),multi_a(2,@3/**,@4/**)))"
confusion_score = 4
cleartext = [
    "Primary path: @0",
    "2 of @1 and @2 AND 2 of @3 and @4",
]
has_cleartext = true

# BothMustSign AND SortedMultisig: score = 1 * 1 = 1
[[vector]]
template = "tr(@0/**,and_v(v:and_v(v:pk(@1/**),pk(@2/**)),sortedmulti_a(2,@3/**,@4/**)))"
confusion_score = 1
cleartext = [
    "Primary path: @0",
    "Both @1 and @2 must sign AND 2 of @3 and @4 (sorted)",
]
has_cleartext = true

# AndV leaf alongside a normal leaf: SingleSig sorts before AndV
[[vector]]
template = "tr(@0/**,{pk(@1/**),and_v(v:pk(@2/**),sortedmulti_a(2,@3/**,@4/**))})"
confusion_score = 1
cleartext = [
    "Primary path: @0",
    "Single-signature (@1)",
    "Single-signature (@2) AND 2 of @3 and @4 (sorted)",
]
has_cleartext = true

