# Tie-break: two SingleSig leaves given in reverse key_index order
[[vector]]
template = "tr(@0/**,{pk(@2/**),pk(@1/**)})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@1)",
    "Single-signature (@2)",
]
has_cleartext = true

# Tie-break: two RelativeHeightlockSingleSig leaves -- sort by key_index, then blocks
[[vector]]
template = "tr(@0/**,{and_v(v:pk(@2/<0;1>/*),older(2000)),and_v(v:pk(@1/<0;1>/*),older(1000))})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@1) after 1000 blocks",
    "Single-signature (@2) after 2000 blocks",
]
has_cleartext = true

# Tie-break: two Multisig leaves -- fewer keys first, then smaller threshold
[[vector]]
template = "tr(@0/**,{multi_a(2,@1/**,@2/**,@3/**),multi_a(2,@4/**,@5/**)})"
cleartext = [
    "Primary path: @0",
    "2 of @4 and @5",
    "2 of @1, @2 and @3",
]
has_cleartext = true

# Recognised first leaf + unrecognised second leaf (complex miniscript)
[[vector]]
template = "tr(@0/**,{and_v(v:pk(@1/**),older(960)),t:or_c(pk(@2/**),and_v(v:pk(@3/**),or_c(pk(@4/**),v:ripemd160(907cd521fff981ce4063a4dc43c6f3fd28e08995))))})"
cleartext = [
    "Primary path: @0",
    "Single-signature (@1) after 960 blocks",
    "t:or_c(pk(@2/**),and_v(v:pk(@3/**),or_c(pk(@4/**),v:ripemd160(907cd521fff981ce4063a4dc43c6f3fd28e08995))))",
]
has_cleartext = false

