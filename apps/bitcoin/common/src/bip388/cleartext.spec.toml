# Cleartext-display specification for BIP388 descriptor templates.
#
# This file is the single source of truth for:
#   - Which descriptor template shapes have a cleartext display
#   - The cleartext template (literals + dynamic fields) for each shape
#   - The score (number of structurally distinct templates that share a shape's
#     cleartext rendering)
#   - The reverse-direction reconstruction (cleartext -> all DescriptorTemplate
#     candidates)
#
# A build script (`build.rs`) parses this file and generates Rust code that
# implements all of the above. See `cleartext.rs` for how the generated code is
# integrated, and `cleartext.spec.md` for the spec-language reference (binding
# kinds, ranges, the `musig` primitive contract).
#
# Two tables here:
#   - `[[top_level]]` -- shapes for the root DescriptorTemplate
#   - `[[tapleaf]]`   -- shapes for the leaves of a taproot tree
#
# Each entry has:
#   - `name`     : variant name in the generated DescriptorClass / TapleafClass
#   - `patterns` : list of pattern strings; the generated classifier tries each
#                  in order. The score equals the number of patterns that admit
#                  a class instance (including round-trip checks performed by
#                  primitives such as `musig`).
#   - `cleartext`: list of literal strings and `$field` references. The
#                  field's display kind is derived from its binding-name kind.
#
# Tapleaf entries also carry their position in this file as their display
# `order` (used to group leaves when rendering a taptree).

# =============================================================================
# Top-level patterns
# =============================================================================

[[top_level]]
name = "LegacySingleSig"
patterns = ["pkh($key)"]
cleartext = ["Legacy single-signature (", "$key", ")"]

[[top_level]]
name = "SegwitSingleSig"
patterns = ["wpkh($key)", "sh(wpkh($key))"]
cleartext = ["Segwit single-signature (", "$key", ")"]

[[top_level]]
name = "SegwitMultisig"
patterns = [
    "wsh(multi($threshold, $keys))",
    "wsh(sortedmulti($threshold, $keys))",
    "sh(wsh(multi($threshold, $keys)))",
    "sh(wsh(sortedmulti($threshold, $keys)))",
]
cleartext = ["$threshold", " of ", "$keys", " (SegWit)"]

[[top_level]]
name = "Taproot"
patterns = ["tr($internal_key, $leaves)"]
cleartext = ["Primary path: ", "$internal_key"]

[[top_level]]
name = "TaprootMusig"
patterns = ["tr(musig($threshold, $keys), $leaves)"]
cleartext = ["Primary path: ", "$threshold", " of ", "$keys"]

# =============================================================================
# Tapleaf patterns
# =============================================================================

[[tapleaf]]
name = "SingleSig"
patterns = ["pk($key)"]
cleartext = ["Single-signature (", "$key", ")"]

[[tapleaf]]
name = "BothMustSign"
patterns = ["and_v(v:pk($key1), pk($key2))"]
cleartext = ["Both ", "$key1", " and ", "$key2", " must sign"]

[[tapleaf]]
name = "SortedMultisig"
patterns = ["sortedmulti_a($threshold, $keys)"]
cleartext = ["$threshold", " of ", "$keys", " (sorted)"]

[[tapleaf]]
name = "Multisig"
patterns = [
    "multi_a($threshold, $keys)",
    "pk(musig($threshold, $keys))",
]
cleartext = ["$threshold", " of ", "$keys"]

[[tapleaf]]
name = "RelativeHeightlockSingleSig"
patterns = ["and_v(v:pk($key), older($blocks))"]
cleartext = ["$key", " after ", "$blocks", " blocks"]

[[tapleaf]]
name = "RelativeHeightlockBothMustSign"
patterns = ["and_v(v:and_v(v:pk($key1), pk($key2)), older($blocks))"]
cleartext = ["Both ", "$key1", " and ", "$key2", " after ", "$blocks", " blocks"]

[[tapleaf]]
name = "RelativeHeightlockMultiSig"
patterns = [
    "and_v(v:multi_a($threshold, $keys), older($blocks))",
    "and_v(v:pk(musig($threshold, $keys)), older($blocks))",
]
cleartext = ["$threshold", " of ", "$keys", " after ", "$blocks", " blocks"]

[[tapleaf]]
name = "RelativeTimelockSingleSig"
patterns = ["and_v(v:pk($key), older($relative_time))"]
cleartext = ["$key", " after ", "$relative_time"]

[[tapleaf]]
name = "RelativeTimelockBothMustSign"
patterns = ["and_v(v:and_v(v:pk($key1), pk($key2)), older($relative_time))"]
cleartext = ["Both ", "$key1", " and ", "$key2", " after ", "$relative_time"]

[[tapleaf]]
name = "RelativeTimelockMultiSig"
patterns = [
    "and_v(v:multi_a($threshold, $keys), older($relative_time))",
    "and_v(v:pk(musig($threshold, $keys)), older($relative_time))",
]
cleartext = ["$threshold", " of ", "$keys", " after ", "$relative_time"]

[[tapleaf]]
name = "AbsoluteHeightlockSingleSig"
patterns = ["and_v(v:pk($key), after($block_height))"]
cleartext = ["$key", " after block height ", "$block_height"]

[[tapleaf]]
name = "AbsoluteHeightlockBothMustSign"
patterns = ["and_v(v:and_v(v:pk($key1), pk($key2)), after($block_height))"]
cleartext = ["Both ", "$key1", " and ", "$key2", " after block height ", "$block_height"]

[[tapleaf]]
name = "AbsoluteHeightlockMultiSig"
patterns = [
    "and_v(v:multi_a($threshold, $keys), after($block_height))",
    "and_v(v:pk(musig($threshold, $keys)), after($block_height))",
]
cleartext = ["$threshold", " of ", "$keys", " after block height ", "$block_height"]

[[tapleaf]]
name = "AbsoluteTimelockSingleSig"
patterns = ["and_v(v:pk($key), after($timestamp))"]
cleartext = ["$key", " after date ", "$timestamp"]

[[tapleaf]]
name = "AbsoluteTimelockBothMustSign"
patterns = ["and_v(v:and_v(v:pk($key1), pk($key2)), after($timestamp))"]
cleartext = ["Both ", "$key1", " and ", "$key2", " after date ", "$timestamp"]

[[tapleaf]]
name = "AbsoluteTimelockMultiSig"
patterns = [
    "and_v(v:multi_a($threshold, $keys), after($timestamp))",
    "and_v(v:pk(musig($threshold, $keys)), after($timestamp))",
]
cleartext = ["$threshold", " of ", "$keys", " after date ", "$timestamp"]
